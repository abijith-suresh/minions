name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  host-compatibility:
    name: OpenCode ${{ matrix.opencode-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        opencode-version:
          - 1.4.0
          - 1.17.13

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Setup npm
        run: npm install --global npm@11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Install OpenCode host
        env:
          OPENCODE_VERSION: ${{ matrix.opencode-version }}
        run: |
          npm install \
            --prefix "$RUNNER_TEMP/opencode-host" \
            --no-audit \
            --no-fund \
            --no-package-lock \
            --no-save \
            "opencode-ai@$OPENCODE_VERSION"

      - name: Test installed package against OpenCode
        env:
          OPENCODE_BIN: ${{ runner.temp }}/opencode-host/node_modules/.bin/opencode
          OPENCODE_VERSION: ${{ matrix.opencode-version }}
        run: npm run test:host

  release:
    needs:
      - host-compatibility
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          package-manager-cache: false

      - name: Setup npm
        run: npm install --global npm@11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Verify repository
        run: npm run verify

      - name: Explain disabled release automation
        if: env.RELEASE_TOKEN == ''
        run: |
          echo "::notice::Release automation is disabled until RELEASE_TOKEN is configured."
          echo "::notice::The package is private and cannot be published during pre-v1 development."

      - name: Create release pull request or publish package
        if: env.RELEASE_TOKEN != ''
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          commit: "chore: version packages"
          publish: npm run publish:release
          title: "chore: version packages"
          version: npm run version:packages
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}
